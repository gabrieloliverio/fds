name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Build
        run: go build -o fds

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: fds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
